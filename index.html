<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#e8860a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="たからさがし">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>たからさがし</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Kaisei+Decol:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/assets/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div id="app">
  <div id="tabs-wrap"></div>
  <div id="screen-root" style="display:flex;flex-direction:column;flex:1;overflow:hidden;"></div>
</div>

<!-- PWAアップデートバナー -->
<div id="update-banner" style="display:none;position:fixed;bottom:60px;left:0;right:0;
  background:var(--amber);color:white;padding:10px 16px;
  align-items:center;justify-content:space-between;
  font-size:12px;z-index:200;gap:8px;">
  <span>🆕 アップデートがあるよ！</span>
  <button onclick="App.applyUpdate()"
    style="background:white;color:var(--amber);border:none;border-radius:20px;
    padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;">
    いますぐ更新
  </button>
</div>

<!--
  ★ script 読み込み順序（依存関係の順）

  1. constants.js  … 定数（LENSES, BADGES 等）→ 全ファイルから参照
  2. common.js     … ユーティリティ（esc, fmtDate, $id 等）→ view/app から参照
  3. state.js      … S オブジェクト + persistSave/persistLoad → app/main から参照
  4. ai.js         … callAI, プロンプト生成 → app から参照
  5. view.js       … render関数群 → app/main から参照
  6. app.js        … App オブジェクト, render(), bindEvents() → main から参照
  7. main.js       … 起動シーケンス（最後に実行）
-->
<script src="src/data/constants.js"></script>
<script src="src/render/common.js"></script>
<script src="src/logic/state.js"></script>
<script src="src/logic/ai.js"></script>
<script src="src/render/view.js"></script>
<script src="src/logic/app.js"></script>
<script src="src/main.js"></script>

</body>
</html>
